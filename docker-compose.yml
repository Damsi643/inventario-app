services:

  db:
    image: mysql:8.0
    container_name: inventario-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_123
      MYSQL_DATABASE: db_inventario
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass_123
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: inventario-app
    ports:
      - "8081:8081"
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: db_inventario
      MYSQLUSER: app_user
      MYSQLPASSWORD: app_pass_123
      MYSQL_SSL: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql-data:
