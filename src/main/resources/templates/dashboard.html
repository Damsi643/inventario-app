<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | DJK Electronics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="/assets/css/dashboard.css">

</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">

<div>

<div class="logo">

<h2>DJK</h2>
<p>ELECTRONICS</p>

</div>

<ul class="menu">

<li class="active">
<i class="bi bi-grid-fill"></i>
<span>Dashboard</span>
</li>

<li>
<i class="bi bi-box-seam"></i>
<span>Productos</span>
</li>

<li>
<i class="bi bi-tags"></i>
<span>Categorías</span>
</li>

<li>
<i class="bi bi-cart3"></i>
<span>Ventas</span>
</li>

<li>
<i class="bi bi-boxes"></i>
<span>Stock</span>
</li>

</ul>

</div>

<div class="bottom-box">

<h4>DJK Electronics</h4>

<p>Tecnología que conecta</p>

</div>

</div>

<!-- MAIN CONTENT -->
<div class="main-content">

<!-- TOPBAR -->
<div class="topbar">

<h1>Dashboard</h1>

<button class="btn-admin" onclick="window.location.href='/admin'">

<i class="bi bi-person-circle"></i>
Admin

</button>

</div>

<!-- CARDS -->
<div class="cards">

<div class="card blue">

<div class="icon">
<i class="bi bi-box-seam"></i>
</div>

<div>
<h3 id="totalProductos">0</h3>
<p>Productos</p>
</div>

</div>

<div class="card yellow">

<div class="icon">
<i class="bi bi-boxes"></i>
</div>

<div>
<h3 id="stockTotal">0</h3>
<p>Stock Total</p>
</div>

</div>

<div class="card green">

<div class="icon">
<i class="bi bi-database"></i>
</div>

<div>
<h3 id="totalCategorias">0</h3>
<p>Categorías</p>
</div>

</div>

</div>

<!-- FORMULARIO AGREGAR PRODUCTO -->
<div class="form-box">

<h2><i class="bi bi-plus-circle"></i> Agregar Producto</h2>

<form id="formProducto">

<div class="grid">

<input type="text"
id="nombre"
name="nombre"
placeholder="Nombre del producto"
required>

<input type="text"
id="marca"
name="marca"
placeholder="Marca"
required>

<input type="text"
id="descripcion"
name="descripcion"
placeholder="Descripción"
required>

<input type="number"
id="precio"
name="precio"
placeholder="Precio"
step="0.01"
required>

<input type="number"
id="stock"
name="stock"
placeholder="Stock"
required>

<input type="text"
id="foto"
name="foto"
placeholder="URL de la imagen"
required>

</div>

<button type="submit" class="btn-save">

<i class="bi bi-save"></i>
Guardar Producto

</button>

</form>

</div>

<!-- TABLA DE PRODUCTOS -->
<div class="table-box">

<div class="table-header">

<h2><i class="bi bi-list-ul"></i> Lista de Productos</h2>

</div>

<div class="table-responsive">

<table>

<thead>

<tr>

<th>Imagen</th>
<th>Nombre</th>
<th>Marca</th>
<th>Descripción</th>
<th>Precio</th>
<th>Stock</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="tabla-productos">

<tr>
<td colspan="7" class="text-center">Cargando productos...</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

<script>

const API_URL = "http://localhost:8081/api/productos";
const tabla = document.getElementById("tabla-productos");
const form = document.getElementById("formProducto");

// Cargar productos al iniciar
cargarProductos();

function cargarProductos() {
    fetch(API_URL)
        .then(response => response.json())
        .then(productos => {
            mostrarProductos(productos);
            actualizarEstadisticas(productos);
        })
        .catch(error => {
            console.error("Error al cargar productos:", error);
            tabla.innerHTML = `<tr><td colspan="7" class="text-center text-danger">Error al cargar productos</td></tr>`;
        });
}

function mostrarProductos(productos) {
    if (productos.length === 0) {
        tabla.innerHTML = `<tr><td colspan="7" class="text-center">No hay productos registrados</td></tr>`;
        return;
    }

    tabla.innerHTML = "";
    
    productos.forEach(producto => {
        const row = document.createElement("tr");
        
        row.innerHTML = `
            <td>
                <img src="${producto.foto || 'https://via.placeholder.com/50'}" 
                     class="img-producto" 
                     alt="${producto.nombre}"
                     onerror="this.src='https://via.placeholder.com/50'">
            </td>
            <td><strong>${producto.nombre}</strong></td>
            <td>${producto.marca || '-'}</td>
            <td>${producto.descripcion || '-'}</td>
            <td class="precio">$${Number(producto.precio).toLocaleString()}</td>
            <td><span class="stock">${producto.stock} unidades</span></td>
            <td>
                <button class="edit" onclick="editarProducto(${producto.id})">
                    <i class="bi bi-pencil-square"></i>
                </button>
                <button class="delete" onclick="eliminarProducto(${producto.id})">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        `;
        
        tabla.appendChild(row);
    });
}

function actualizarEstadisticas(productos) {
    // Total de productos
    document.getElementById("totalProductos").innerText = productos.length;
    
    // Stock total
    let stockTotal = 0;
    const categorias = new Set();
    
    productos.forEach(producto => {
        stockTotal += producto.stock || 0;
        if (producto.marca) categorias.add(producto.marca);
    });
    
    document.getElementById("stockTotal").innerText = stockTotal;
    document.getElementById("totalCategorias").innerText = categorias.size;
}

// Guardar producto
form.addEventListener("submit", function(e) {
    e.preventDefault();
    
    const producto = {
        nombre: document.getElementById("nombre").value,
        marca: document.getElementById("marca").value,
        descripcion: document.getElementById("descripcion").value,
        precio: parseFloat(document.getElementById("precio").value),
        stock: parseInt(document.getElementById("stock").value),
        foto: document.getElementById("foto").value
    };
    
    fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(producto)
    })
    .then(response => response.json())
    .then(data => {
        form.reset();
        cargarProductos();
        mostrarMensaje("Producto guardado exitosamente", "success");
    })
    .catch(error => {
        console.error("Error al guardar:", error);
        mostrarMensaje("Error al guardar el producto", "error");
    });
});

// Eliminar producto
function eliminarProducto(id) {
    if (confirm("¿Estás seguro de eliminar este producto?")) {
        fetch(`${API_URL}/${id}`, {
            method: "DELETE"
        })
        .then(() => {
            cargarProductos();
            mostrarMensaje("Producto eliminado", "success");
        })
        .catch(error => {
            console.error("Error al eliminar:", error);
            mostrarMensaje("Error al eliminar el producto", "error");
        });
    }
}

// Editar producto (para implementar después)
function editarProducto(id) {
    alert("Funcionalidad de edición próximamente");
    // Aquí puedes implementar la edición
}

// Mostrar mensajes temporales
function mostrarMensaje(mensaje, tipo) {
    const alertDiv = document.createElement("div");
    alertDiv.className = `alert alert-${tipo === 'success' ? 'success' : 'danger'} alert-dismissible fade show`;
    alertDiv.innerHTML = `
        ${mensaje}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    
    const topbar = document.querySelector(".topbar");
    topbar.insertAdjacentElement("afterend", alertDiv);
    
    setTimeout(() => {
        alertDiv.remove();
    }, 3000);
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
