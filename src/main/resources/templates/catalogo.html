<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo | DJK Electronics</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- CSS (Spring Boot static) -->
<link rel="stylesheet" href="/css/catalogo.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">

<div class="container">

<a class="navbar-brand logo" href="/index.html">
DJK Electronics
</a>

<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav mx-auto">

<li class="nav-item">
<a class="nav-link" href="/index.html">Inicio</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="/catalogo">Catálogo</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Categorías</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Ofertas</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Contacto</a>
</li>

</ul>

<div class="d-flex align-items-center gap-3">

<!-- SEARCH -->
<div class="search-box">
<i class="bi bi-search"></i>
<input type="text" placeholder="Buscar productos...">
</div>

<!-- ICONOS -->
<i class="bi bi-heart nav-icon"></i>

<div class="cart-icon">
<i class="bi bi-cart3 nav-icon"></i>
<span class="cart-badge">0</span>
</div>

<i class="bi bi-person-circle nav-icon"></i>

</div>

</div>

</div>

</nav>

<!-- HERO -->
<section class="catalogo-hero">

<div class="container text-center">

<h1>Explora nuestro catálogo</h1>

<p>
Descubre productos tecnológicos y electrodomésticos modernos para tu hogar
</p>

</div>

</section>

<!-- PRODUCTOS -->
<section class="products-section">

<div class="container">

<div class="d-flex justify-content-between align-items-center mb-5">

<h2 class="section-title">Productos disponibles</h2>

<button class="filter-btn">
<i class="bi bi-funnel"></i>
Filtros
</button>

</div>

<!-- CONTENEDOR DINÁMICO -->
<div class="row g-4" id="contenedor-productos">

<!-- Aquí se cargan los productos desde la API -->

</div>

</div>

</section>

<!-- FOOTER -->
<footer class="footer">

<div class="container text-center">
<p>© 2026 DJK Electronics - Todos los derechos reservados</p>
</div>

</footer>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script src="/js/catalogo.js"></script>

</body>

</html>
